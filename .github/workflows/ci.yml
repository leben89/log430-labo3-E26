name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          echo "DB_HOST=mysql" > .env
          echo "DB_PORT=3306" >> .env
          echo "DB_NAME=labo03_db" >> .env
          echo "DB_USER=labo03" >> .env
          echo "DB_PASS=labo03" >> .env
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_DB=0" >> .env

      - name: Build containers
        run: docker-compose build

      - name: Start containers
        run: docker-compose up -d

      - name: Wait for services
        run: sleep 20

      - name: Show store_manager logs
        run: |
          docker logs $(docker ps -qf "name=store_manager")

      - name: Wait for MySQL
        run: |
          timeout=60

          until docker exec $(docker ps -qf "name=mysql") \
            mysqladmin ping -h localhost -ulabo03 -plabo03 --silent
          do
            echo "Waiting for MySQL..."
            sleep 5
            timeout=$((timeout-5))

            if [ $timeout -le 0 ]; then
              echo "MySQL not ready"
              exit 1
            fi
          done

      - name: Run tests
        run: |
          docker exec $(docker ps -qf "name=store_manager") pytest -v
        continue-on-error: true

      - name: Show logs
        if: always()
        run: |
          docker logs $(docker ps -qf "name=store_manager")

      - name: Show MySQL logs
        if: always()
        run: |
          docker logs $(docker ps -qf "name=mysql")